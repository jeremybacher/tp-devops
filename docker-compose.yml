services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tp-devops:local
    ports:
      - '8080:8080'
    environment:
      APP_PORT: 8080
      # NEW_RELIC_LICENSE_KEY: ""
      # NEW_RELIC_APP_NAME: "tp-devops"
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8080/ping']
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped
